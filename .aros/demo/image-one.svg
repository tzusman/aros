<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <clipPath id="textClip1">
      <text x="400" y="260" font-family="Arial, Helvetica, sans-serif" font-size="220" font-weight="900" text-anchor="middle" letter-spacing="12">AROS</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Geometric pattern clipped to AROS text -->
  <g clip-path="url(#textClip1)">
    <!-- Diagonal stripes -->
    <rect x="-100" y="-100" width="1000" height="600" fill="#6366f1"/>
    <line x1="0" y1="0" x2="800" y2="400" stroke="#0f172a" stroke-width="3" opacity="0.15"/>
    <line x1="100" y1="0" x2="900" y2="400" stroke="#0f172a" stroke-width="3" opacity="0.15"/>
    <line x1="-100" y1="0" x2="700" y2="400" stroke="#0f172a" stroke-width="3" opacity="0.15"/>
    <line x1="200" y1="0" x2="1000" y2="400" stroke="#0f172a" stroke-width="3" opacity="0.15"/>
    <line x1="-200" y1="0" x2="600" y2="400" stroke="#0f172a" stroke-width="3" opacity="0.15"/>

    <!-- Concentric circles -->
    <circle cx="400" cy="200" r="300" fill="none" stroke="#a5b4fc" stroke-width="40"/>
    <circle cx="400" cy="200" r="220" fill="none" stroke="#a5b4fc" stroke-width="30" opacity="0.6"/>
    <circle cx="400" cy="200" r="150" fill="none" stroke="#a5b4fc" stroke-width="20" opacity="0.4"/>
    <circle cx="400" cy="200" r="80" fill="none" stroke="#a5b4fc" stroke-width="14" opacity="0.25"/>

    <!-- Diamond grid overlay -->
    <polygon points="400,20 780,200 400,380 20,200" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.5"/>
    <polygon points="400,80 680,200 400,320 120,200" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.4"/>
    <polygon points="400,130 580,200 400,270 220,200" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Decorative corner triangles -->
  <polygon points="0,0 80,0 0,80" fill="#6366f1" opacity="0.3"/>
  <polygon points="800,0 720,0 800,80" fill="#6366f1" opacity="0.3"/>
  <polygon points="0,400 80,400 0,320" fill="#6366f1" opacity="0.3"/>
  <polygon points="800,400 720,400 800,320" fill="#6366f1" opacity="0.3"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="#6366f1" stroke-width="2" rx="4" opacity="0.4"/>
</svg>
