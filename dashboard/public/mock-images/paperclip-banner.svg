    <text x="125" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffd200" text-anchor="middle">99.9%</text>
    <text x="125" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0b0c0" text-anchor="middle" letter-spacing="2">UPTIME SLA</text>
  </g>
  <g transform="translate(415, 480)">
    <rect width="250" height="120" rx="16" fill="#ffffff" opacity="0.05"/>
    <text x="125" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffd200" text-anchor="middle">SOC 2</text>
    <text x="125" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a0b0c0" text-anchor="middle" letter-spacing="2">CERTIFIED</text>
  </g>
  <g transform="translate(710, 480)">
