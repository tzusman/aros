      <stop offset="0%" style="stop-color:#141e30"/>
      <stop offset="100%" style="stop-color:#243b55"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <!-- Abstract shapes -->
  <rect x="60" y="60" width="960" height="960" rx="40" fill="none" stroke="#ffd200" stroke-width="1" opacity="0.08"/>
