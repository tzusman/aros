  <text x="540" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#ffd200" text-anchor="middle" letter-spacing="8">INTRODUCING</text>
  <text x="540" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">PaperclipAI</text>
  <text x="540" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Enterprise</text>
  <!-- Feature boxes -->
  <g transform="translate(120, 480)">
