  </g>
  <g transform="translate(820, 120) rotate(20)" opacity="0.4">
    <path d="M30 16 C30 7, 37 0, 46 0 C55 0, 62 7, 62 16 L62 84 C62 97, 51 108, 38 108 C25 108, 14 97, 14 84 L14 32 C14 23, 21 16, 30 16Z" fill="none" stroke="#b91d73" stroke-width="5" stroke-linecap="round"/>
  </g>
