  <text x="540" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="160" font-weight="900" fill="#ffffff" text-anchor="middle">10x</text>
  <text x="540" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a0a0c0" text-anchor="middle" letter-spacing="3">FASTER DOCUMENT PROCESSING</text>
